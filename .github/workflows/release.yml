name: Build and Release Kozainek

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Prepare Assets (Model & Font)
      run: |
        # Download YOLOv8n-seg model if it doesn't exist (because it wasn't pushed to git)
        if (-Not (Test-Path "yolov8n-seg.pt")) {
            Write-Host "Downloading YOLO model..."
            Invoke-WebRequest -Uri "https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov26n-seg.pt" -OutFile "yolov26n-seg.pt"
        }
        
        # Ensure Arial font exists (copy from System if not in repo)
        if (-Not (Test-Path "arial.ttf")) {
            Write-Host "Copying Arial font from system..."
            Copy-Item "C:\Windows\Fonts\arial.ttf" -Destination "arial.ttf"
        }

    - name: Build with PyInstaller
      run: |
        pyinstaller --name Kozainek --onedir --add-data "app;app" --add-data "yolov26n-seg.pt;." --add-data "arial.ttf;." --hidden-import "cv2" --hidden-import "torch" --hidden-import "ultralytics" --hidden-import "PIL" --hidden-import "numpy" --hidden-import "scipy" --hidden-import "websockets" --hidden-import "fastapi" --hidden-import "uvicorn" --hidden-import "starlette" --hidden-import "pydantic" --hidden-import "httpx" --hidden-import "polars" --hidden-import "yaml" --hidden-import "pyngrok" app/main.py -y

    - name: Zip the build
      run: |
        Compress-Archive -Path dist/Kozainek -DestinationPath Kozainek-Windows.zip

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "Kozainek-Windows.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
        generateReleaseNotes: true
