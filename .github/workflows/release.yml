name: Build and Release Kozainek

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --name Kozainek --onedir --add-data "app;app" --add-data "yolov8n-seg.pt;." --add-data "arial.ttf;." --hidden-import "cv2" --hidden-import "torch" --hidden-import "ultralytics" --hidden-import "PIL" --hidden-import "numpy" --hidden-import "scipy" --hidden-import "websockets" --hidden-import "fastapi" --hidden-import "uvicorn" --hidden-import "starlette" --hidden-import "pydantic" --hidden-import "httpx" --hidden-import "polars" --hidden-import "yaml" --hidden-import "pyngrok" app/main.py -y

    - name: Zip the build
      run: |
        Compress-Archive -Path dist/Kozainek -DestinationPath Kozainek-Windows.zip

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "Kozainek-Windows.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
        generateReleaseNotes: true
