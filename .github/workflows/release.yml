name: Build and Release Kozainek (Latest)

on:
  push:
    branches:
      - main # Trigger on every push to the main branch
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Prepare Assets (Font)
      run: |
        # Ensure Arial font exists (copy from System if not in repo)
        if (-Not (Test-Path "arial.ttf")) {
            Write-Host "Copying Arial font from system..."
            Copy-Item "C:\Windows\Fonts\arial.ttf" -Destination "arial.ttf"
        }

    - name: Build with PyInstaller
      run: |
        pyinstaller --name Kozainek --onedir --add-data "app;app" --add-data "arial.ttf;." --hidden-import "cv2" --hidden-import "torch" --hidden-import "ultralytics" --hidden-import "PIL" --hidden-import "numpy" --hidden-import "scipy" --hidden-import "websockets" --hidden-import "fastapi" --hidden-import "uvicorn" --hidden-import "starlette" --hidden-import "pydantic" --hidden-import "httpx" --hidden-import "polars" --hidden-import "yaml" --hidden-import "pyngrok" --hidden-import "lap" --hidden-import "lapx" --hidden-import "sounddevice" --hidden-import "soundfile" --hidden-import "tkinter" --hidden-import "tkinter.filedialog" app/main.py -y

    - name: Zip the build
      run: |
        Compress-Archive -Path dist/Kozainek -DestinationPath Kozainek-Windows.zip

    - name: Update Latest Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "Kozainek-Windows.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "latest"
        name: "Latest Build"
        body: "Automated build from commit ${{ github.sha }}"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
        makeLatest: true
